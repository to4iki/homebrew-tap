name: update-formula

on:
  # schedule:
  #   # 06:00 JST (21:00 UTC previous day)
  #   - cron: "0 21 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Update formulae via maltmill
    runs-on: macos-latest
    steps:
      - name: Checkout tap
        uses: actions/checkout@v4

      - name: Install maltmill
        run: brew install Songmu/tap/maltmill

      - name: Run maltmill
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: make update

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: update-formulae
          commit-message: "update formulae via maltmill"
          title: "update formulae via maltmill"
          body: |
            Automated update of Homebrew formulae by
            [`Songmu/maltmill`](https://github.com/Songmu/maltmill).
          delete-branch: true
