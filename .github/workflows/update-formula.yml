name: update-formula

on:
  # schedule:
  #   # 06:00 JST (21:00 UTC previous day)
  #   - cron: "0 21 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Update formulae via maltmill
    runs-on: macos-latest
    steps:
      - name: Checkout tap
        uses: actions/checkout@v4

      - name: Install maltmill
        run: brew install Songmu/tap/maltmill

      - name: Run maltmill
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: make update

      - name: Commit and push
        uses: EndBug/add-and-commit@v10
        with:
          add: 'Formula/*.rb'
